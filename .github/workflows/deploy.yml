name: Validate

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: validate-gec-trainer-site
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate bank
        run: node scripts/validate-bank.mjs
