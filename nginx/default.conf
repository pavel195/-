server {
    listen 443 ssl;
    server_name chipkineev.ru;

    ssl_certificate /etc/nginx/certs/chipkineev.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/chipkineev.ru/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
